name: ci

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install virtual display (uiohook-napi needs an X server to probe)
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: xvfb-run -a npm test
      - run: npm run typecheck
      - run: npm run format:check
